services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: meditation
      POSTGRES_USER: meditation
      POSTGRES_PASSWORD: meditation
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U meditation -d meditation']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
